; Asterisk Dialplan Configuration for STT Integration
; Add this to your Vicidial extensions.conf or dialplan

[stt-example]
; Example context for STT recording and transcription
exten => _X.,1,Answer()
    same => n,Playback(beep)
    same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/${UNIQUEID}.wav)
    same => n,Record(${RECORDING_FILE},5,30,k)
    same => n,Playback(beep)
    same => n,AGI(stt_recognition.py)
    same => n,NoOp(Transcription: ${STT_RESULT})
    same => n,GotoIf($["${STT_SUCCESS}" = "1"]?success:failure)
    same => n(success),Playback(thank-you)
    same => n,Hangup()
    same => n(failure),Playback(sorry)
    same => n,Hangup()

[vicidial-stt-inbound]
; Inbound call with STT transcription
exten => _X.,1,Answer()
    same => n,Set(CALLERID(name)=${CALLERID(num)})
    same => n,Wait(1)
    same => n,Playback(welcome)
    ; Record customer response
    same => n,Playback(record-prompt)
    same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/vicidial-${UNIQUEID}.wav)
    same => n,Record(${RECORDING_FILE},5,30,k)
    ; Process with STT
    same => n,AGI(stt_recognition.py)
    same => n,NoOp(Customer said: ${STT_RESULT})
    ; Continue with Vicidial routing
    same => n,Goto(vicidial-auto,${EXTEN},1)

[vicidial-stt-survey]
; Post-call survey with STT
exten => _X.,1,Answer()
    same => n,Wait(1)
    same => n,Playback(survey-intro)
    ; Question 1
    same => n,Playback(question1)
    same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/survey-q1-${UNIQUEID}.wav)
    same => n,Record(${RECORDING_FILE},3,15,k)
    same => n,AGI(stt_recognition.py)
    same => n,Set(SURVEY_Q1=${STT_RESULT})
    ; Question 2
    same => n,Playback(question2)
    same => n,Set(RECORDING_FILE=/var/spool/asterisk/monitor/survey-q2-${UNIQUEID}.wav)
    same => n,Record(${RECORDING_FILE},3,15,k)
    same => n,AGI(stt_recognition.py)
    same => n,Set(SURVEY_Q2=${STT_RESULT})
    ; End survey
    same => n,Playback(thank-you)
    same => n,Hangup()

[vicidial-stt-voicemail]
; Voicemail transcription
exten => _X.,1,Answer()
    same => n,Wait(1)
    same => n,Playback(vm-intro)
    same => n,Set(RECORDING_FILE=/var/spool/asterisk/voicemail/${EXTEN}-${UNIQUEID}.wav)
    same => n,Record(${RECORDING_FILE},5,120,k)
    same => n,AGI(stt_recognition.py)
    same => n,System(echo "${STT_RESULT}" > /var/spool/asterisk/voicemail/${EXTEN}-${UNIQUEID}.txt)
    same => n,Playback(vm-goodbye)
    same => n,Hangup()
