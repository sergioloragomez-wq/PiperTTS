[general]
# STT Engine Configuration
engine = vosk
model_path = /var/lib/asterisk/models/vosk-model-es-0.42
sample_rate = 8000
language = es-ES

[vicidial]
# Vicidial Integration Settings
agi_path = /var/lib/asterisk/agi-bin
log_path = /var/log/asterisk/stt
recording_path = /var/spool/asterisk/monitor
enable_logging = true
log_level = INFO

[vosk]
# Vosk STT Engine Settings
model_url = https://alphacephei.com/vosk/models/vosk-model-small-es-0.42.zip
grammar_enabled = false
alternatives = 3
max_alternatives = 5

[performance]
# Performance Tuning
threads = 2
buffer_size = 4000
timeout = 30
max_recording_duration = 300

[output]
# Output Format Settings
format = json
confidence_threshold = 0.5
enable_timestamps = true
punctuation = true
