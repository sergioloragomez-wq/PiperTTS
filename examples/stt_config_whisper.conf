# Speech-to-Text Configuration Example using Whisper (Offline)

[general]
engine=whisper
language=es-ES
format=wav
sample_rate=16000
channels=1

[whisper]
model=base
# Model options: tiny, base, small, medium, large
# tiny:   ~39M parameters, fastest, least accurate
# base:   ~74M parameters, good balance
# small:  ~244M parameters, better accuracy
# medium: ~769M parameters, high accuracy
# large:  ~1550M parameters, best accuracy, slowest
model_path=/var/lib/asterisk/whisper/models

[vicidial]
agi_bin_path=/var/lib/asterisk/agi-bin
recordings_path=/var/spool/asterisk/monitor
results_path=/var/log/asterisk/stt_results

db_host=localhost
db_port=3306
db_name=asterisk
db_user=cron
# SECURITY: Replace with a strong password in production
db_pass=CHANGE_THIS_PASSWORD

log_level=INFO
log_file=/var/log/asterisk/stt.log

[advanced]
enable_profanity_filter=no
enable_punctuation=yes
max_alternatives=1
interim_results=no
single_utterance=no
timeout=60
silence_timeout=5
