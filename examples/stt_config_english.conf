# Speech-to-Text Configuration Example for English (US)

[general]
engine=google
language=en-US
format=wav
sample_rate=8000
channels=1

[google]
api_key_file=/etc/asterisk/google-credentials.json
model=phone_call

[vicidial]
agi_bin_path=/var/lib/asterisk/agi-bin
recordings_path=/var/spool/asterisk/monitor
results_path=/var/log/asterisk/stt_results

db_host=localhost
db_port=3306
db_name=asterisk
db_user=cron
db_pass=1234

log_level=INFO
log_file=/var/log/asterisk/stt.log

[advanced]
enable_profanity_filter=yes
enable_punctuation=yes
max_alternatives=3
interim_results=no
single_utterance=no
timeout=30
silence_timeout=3
