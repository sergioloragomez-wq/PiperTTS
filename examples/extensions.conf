; Example Asterisk Dialplan for STT Integration
; Add this to your /etc/asterisk/extensions.conf

[vicidial-stt-example]
; Basic STT call flow
exten => 8000,1,Answer()
exten => 8000,n,Wait(1)
exten => 8000,n,Playback(welcome)
exten => 8000,n,AGI(vicidial_stt.py)
exten => 8000,n,NoOp(STT Status: ${STT_STATUS})
exten => 8000,n,NoOp(Transcribed Text: ${STT_TEXT})
exten => 8000,n,NoOp(Confidence: ${STT_CONFIDENCE})
exten => 8000,n,GotoIf($["${STT_STATUS}" = "SUCCESS"]?success:failed)
exten => 8000,n(success),Playback(thank-you)
exten => 8000,n,Hangup()
exten => 8000,n(failed),Playback(sorry)
exten => 8000,n,Hangup()

[vicidial-stt-ivr]
; Interactive Voice Response with STT
exten => 8001,1,Answer()
exten => 8001,n,Set(ATTEMPTS=0)
exten => 8001,n(start),Playback(please-say-your-selection)
exten => 8001,n,AGI(vicidial_stt.py)
exten => 8001,n,Set(ATTEMPTS=$[${ATTEMPTS} + 1])
exten => 8001,n,GotoIf($["${STT_STATUS}" != "SUCCESS"]?retry)
exten => 8001,n,Set(RESPONSE=${STT_TEXT})
exten => 8001,n,NoOp(Customer said: ${RESPONSE})
; Process the response
exten => 8001,n,GotoIf($["${RESPONSE}" =~ "ventas"]?sales)
exten => 8001,n,GotoIf($["${RESPONSE}" =~ "soporte"]?support)
exten => 8001,n,GotoIf($["${RESPONSE}" =~ "facturacion"]?billing)
exten => 8001,n,Goto(unknown)
exten => 8001,n(sales),Goto(sales-queue,s,1)
exten => 8001,n(support),Goto(support-queue,s,1)
exten => 8001,n(billing),Goto(billing-queue,s,1)
exten => 8001,n(unknown),Playback(invalid-option)
exten => 8001,n,Goto(start)
exten => 8001,n(retry),GotoIf($[${ATTEMPTS} < 3]?start)
exten => 8001,n,Playback(sorry-goodbye)
exten => 8001,n,Hangup()

[vicidial-stt-survey]
; Customer satisfaction survey with STT
exten => 8002,1,Answer()
exten => 8002,n,Wait(1)
exten => 8002,n,Playback(survey-intro)
; Question 1
exten => 8002,n,Playback(question-1)
exten => 8002,n,AGI(vicidial_stt.py)
exten => 8002,n,Set(ANSWER1=${STT_TEXT})
exten => 8002,n,Set(CONFIDENCE1=${STT_CONFIDENCE})
; Question 2
exten => 8002,n,Playback(question-2)
exten => 8002,n,AGI(vicidial_stt.py)
exten => 8002,n,Set(ANSWER2=${STT_TEXT})
exten => 8002,n,Set(CONFIDENCE2=${STT_CONFIDENCE})
; Save results to database or file
exten => 8002,n,System(echo "${CALLERID(num)},${ANSWER1},${CONFIDENCE1},${ANSWER2},${CONFIDENCE2}" >> /var/log/asterisk/surveys.csv)
exten => 8002,n,Playback(thank-you-goodbye)
exten => 8002,n,Hangup()
