# Speech-to-Text Configuration for Vicidial
# This configuration file sets up STT integration with Vicidial/Asterisk

[general]
# STT Engine Configuration
engine=google
# Available engines: google, whisper, deepspeech, sphinx

# Language settings
language=es-ES
# Alternative languages: en-US, es-MX, pt-BR, etc.

# Audio format
format=wav
sample_rate=8000
channels=1

[google]
# Google Cloud Speech-to-Text API settings
api_key_file=/etc/asterisk/google-credentials.json
model=default
# Models: default, command_and_search, phone_call, video

[whisper]
# OpenAI Whisper settings
model=base
# Models: tiny, base, small, medium, large
model_path=/var/lib/asterisk/whisper/models

[deepspeech]
# Mozilla DeepSpeech settings
model_path=/var/lib/asterisk/deepspeech/models
scorer_path=/var/lib/asterisk/deepspeech/scorer

[sphinx]
# CMU Sphinx settings
hmm_path=/usr/share/pocketsphinx/model/hmm/es/
lm_path=/usr/share/pocketsphinx/model/lm/es.lm
dict_path=/usr/share/pocketsphinx/model/dict/es.dict

[vicidial]
# Vicidial integration settings
agi_bin_path=/var/lib/asterisk/agi-bin
recordings_path=/var/spool/asterisk/monitor
results_path=/var/log/asterisk/stt_results

# Database settings for storing transcriptions
db_host=localhost
db_port=3306
db_name=asterisk
db_user=cron
db_pass=1234

# Logging
log_level=INFO
log_file=/var/log/asterisk/stt.log

[advanced]
# Advanced settings
enable_profanity_filter=yes
enable_punctuation=yes
max_alternatives=3
interim_results=no
single_utterance=no

# Timeout settings (in seconds)
timeout=30
silence_timeout=3
